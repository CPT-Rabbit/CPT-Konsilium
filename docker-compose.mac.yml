services:
  konsilium:
    build: .
    image: konsilium:latest
    container_name: konsilium
    user: "10000:10000"
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    mem_limit: 2g
    cpus: "1.0"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    env_file:
      - ${KONSILIUM_HOME}/secrets/konsilium.env
    environment:
      KONSILIUM_AUTH_FILE: /auth/auth.json
      HOME: /home/konsilium
    volumes:
      - ${KONSILIUM_HOME}/config:/config:ro
      - ${KONSILIUM_HOME}/memory:/memory
      - ${KONSILIUM_HOME}/secrets:/secrets:ro
      - ${KONSILIUM_HOME}/auth:/auth
      - ${HOME}/.claude:/home/konsilium/.claude:ro
      # If your Claude Code install stores auth in ~/.claude.json, add:
      # - ${HOME}/.claude.json:/home/konsilium/.claude.json:ro
